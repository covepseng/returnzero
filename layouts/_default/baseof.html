<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.subtitle }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end
    }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <meta property="og:type"        content="article">
  <meta property="og:site_name"   content="ReturnZero">
  <meta property="og:title"       content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.subtitle }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  {{ with .Params.image }}
  <meta property="og:image"       content="{{ . | absURL }}">
  {{ else }}
  <meta property="og:image"       content="{{ "img/og-default.png" | absURL }}">
  {{ end }}
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter/X card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
</head>

<body>

  <nav class="nav">
    <a href="/" class="nav-logo">
      <span class="nav-logo-return">RETURN</span><span class="nav-logo-zero">ZERO</span>
    </a>
    <div class="nav-links">
      <a href="/posts/">Posts</a>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
    </div>
  </nav>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand"><span class="return">RETURN</span><span class="zero">ZERO</span></span>
      <span class="footer-sep">//</span>
      <span>Exploitability Analysis &amp; Product Security Research</span>
      <span class="footer-sep">//</span>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">github.com/covepseng</a>
    </div>
  </footer>

</body>

</html>
